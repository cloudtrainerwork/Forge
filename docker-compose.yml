version: '3.8'

services:
  neo4j:
    # Pin to exact patch version to prevent surprise upgrades.
    # To find the current patch: docker pull neo4j:5.15 && docker image inspect neo4j:5.15 | grep -i version
    image: neo4j:5.15.0
    container_name: forge-neo4j
    ports:
      - "7474:7474"  # HTTP interface
      - "7687:7687"  # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 512m
      NEO4J_dbms_memory_pagecache_size: 128m
      NEO4J_dbms_default__listen__address: 0.0.0.0
      NEO4J_dbms_connector_bolt_listen__address: 0.0.0.0:7687
      NEO4J_dbms_connector_http_listen__address: 0.0.0.0:7474
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  postgres:
    # Pin to exact patch version to prevent surprise upgrades.
    # To find the current patch: docker pull postgres:15 && docker image inspect postgres:15 | grep -i version
    image: postgres:15.12
    container_name: forge-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  neo4j_data:
    name: forge_neo4j_data
  neo4j_logs:
    name: forge_neo4j_logs
  neo4j_plugins:
    name: forge_neo4j_plugins
  postgres_data:
    name: forge_postgres_data

networks:
  default:
    name: forge_network